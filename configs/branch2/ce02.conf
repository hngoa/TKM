! ============================================================
! ce02.conf — FRR Configuration for CE02 (Customer Edge Router)
! Location: Chi nhánh 2 — Three-Tier Network
! Config này do ISP (PE02) chuẩn bị và triển khai tại chi nhánh
!
! Interfaces:
!   ce02-pe02  10.100.2.2/30  -> PE02 (WAN uplink to ISP)
!   ce02-c01   10.2.10.1/24   -> Core01 (Gateway VLAN 10 LAB)
!   ce02-c02   10.2.20.1/24   -> Core02 (Gateway VLAN 20 ADMIN)
!   ce02-c03   10.2.30.1/24   -> Dist02  (Gateway VLAN 30 GUEST)
!   lo         10.0.0.22/32   loopback
!
! Routing:
!   - OSPF redistribute connected: quảng bá 3 VLAN subnets lên PE02
!   - Inter-VLAN routing: CE02 làm router giữa VLAN 10/20/30
!   - Default route via PE02 cho traffic WAN
! ============================================================

frr defaults traditional
hostname ce02
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.22/32
!
! --- WAN Interface (kết nối lên PE02 của ISP) ---
interface ce02-pe02
 description "WAN uplink to ISP PE02 (10.100.2.0/30)"
 ip address 10.100.2.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- LAN Interface VLAN 10 - LAB ---
interface ce02-c01
 description "Inter-VLAN Gateway VLAN 10 - LAB (10.2.10.0/24)"
 ip address 10.2.10.1/24
!
! --- LAN Interface VLAN 20 - ADMIN ---
interface ce02-c02
 description "Inter-VLAN Gateway VLAN 20 - ADMIN (10.2.20.0/24)"
 ip address 10.2.20.1/24
!
! --- LAN Interface VLAN 30 - GUEST ---
interface ce02-c03
 description "Inter-VLAN Gateway VLAN 30 - GUEST (10.2.30.0/24)"
 ip address 10.2.30.1/24
!
! --- OSPF Configuration ---
! CE02 quảng bá cả 3 VLAN subnet về phía ISP
router ospf
 ospf router-id 10.0.0.22
 ! WAN link
 network 10.100.2.0/30 area 0
 ! Redistribute connected tự động quảng bá 3 VLAN subnets:
 !   10.2.10.0/24 (LAB), 10.2.20.0/24 (ADMIN), 10.2.30.0/24 (GUEST)
 redistribute connected
!
! --- Static Default Route ---
ip route 0.0.0.0/0 10.100.2.1
!
line vty
!

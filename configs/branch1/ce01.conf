! ============================================================
! ce01.conf — FRR Configuration for CE01 (Customer Edge Router)
! Location: Chi nhánh 1 — Flat Network
! Config này do ISP (PE01) chuẩn bị và triển khai tại chi nhánh
!
! Interfaces:
!   ce01-pe01  10.100.1.2/30  -> PE01 (WAN uplink to ISP)
!   ce01-sw01  10.1.0.1/24    -> LAN (gateway cho Branch 1)
!   lo         10.0.0.21/32   loopback
!
! Routing:
!   - OSPF redistribute connected: quảng bá LAN subnet lên PE01
!   - Default route via PE01 (10.100.1.1) cho traffic WAN
! ============================================================

frr defaults traditional
hostname ce01
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.21/32
!
! --- WAN Interface (kết nối lên PE01 của ISP) ---
interface ce01-pe01
 description "WAN uplink to ISP PE01 (10.100.1.0/30)"
 ip address 10.100.1.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- LAN Interface (gateway cho chi nhánh 1) ---
interface ce01-sw01
 description "LAN Gateway - Branch 1 (10.1.0.0/24)"
 ip address 10.1.0.1/24
!
! --- OSPF Configuration ---
! CE quảng bá LAN subnet về phía ISP để các chi nhánh khác biết đường đến Branch 1
router ospf
 ospf router-id 10.0.0.21
 ! WAN link - điểm kết nối với ISP
 network 10.100.1.0/30 area 0
 ! Redistribute connected: tự động quảng bá 10.1.0.0/24 (LAN)
 redistribute connected
!
! --- Static Default Route (ISP cung cấp cho customer) ---
ip route 0.0.0.0/0 10.100.1.1
!
line vty
!

! ============================================================
! ce03.conf — FRR Configuration for CE03 (Customer Edge Router)
! Location: Chi nhánh 3 — Spine-Leaf Data Center
! Config này do ISP (PE03) chuẩn bị và triển khai tại chi nhánh
!
! Interfaces:
!   ce03-pe03   10.100.3.2/30  -> PE03 (WAN uplink to ISP)
!   ce03-leaf01 10.3.0.1/16    -> Border Leaf (gateway all DC subnets)
!   lo          10.0.0.23/32   loopback
!
! Routing:
!   - OSPF redistribute connected: quảng bá 10.3.0.0/16 lên PE03
!   - Hosts dùng /16 mask nên on-link reachable qua 1 gateway
!   - Default route via PE03 cho traffic WAN
!
! Note: Dùng /16 supernet thay vì từng /24 riêng lẻ vì
!   spine-leaf fabric không cần inter-subnet routing tại CE
!   (CE chỉ là border gateway, traffic trong fabric đi qua spine)
! ============================================================

frr defaults traditional
hostname ce03
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.23/32
!
! --- WAN Interface (kết nối lên PE03 của ISP) ---
interface ce03-pe03
 description "WAN uplink to ISP PE03 (10.100.3.0/30)"
 ip address 10.100.3.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- Fabric Interface (Border Leaf - Data Center gateway) ---
interface ce03-leaf01
 description "Border Leaf gateway - DC fabric supernet (10.3.0.0/16)"
 ip address 10.3.0.1/16
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.23
 ! WAN link
 network 10.100.3.0/30 area 0
 ! Redistribute connected: quảng bá 10.3.0.0/16 (DC supernet)
 redistribute connected
!
! --- Static Default Route ---
ip route 0.0.0.0/0 10.100.3.1
!
line vty
!

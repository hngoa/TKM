! ============================================================
! p03.conf — FRR Configuration for P03 (Provider Core Router)
! Role: MPLS Label Switching Only — East-Central Hub
! Protocols: OSPF Area 0 + LDP
!
! Interfaces:
!   p03-eth0  10.0.11.2/30  -> P02
!   p03-eth1  10.0.12.1/30  -> P04
!   p03-eth2  10.0.13.2/30  -> P01 (diagonal)
!   p03-pe02  10.0.23.2/30  -> PE02 (dual-homed)
!   p03-pe03  10.0.24.2/30  -> PE03
!   lo        10.0.0.3/32   loopback
! ============================================================

frr defaults traditional
hostname p03
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.3/32
 ip ospf area 0
!
! --- Link P03 <-> P02 ---
interface p03-eth0
 description "Core link to P02 (10.0.11.0/30)"
 ip address 10.0.11.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P03 <-> P04 ---
interface p03-eth1
 description "Core link to P04 (10.0.12.0/30)"
 ip address 10.0.12.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P03 <-> P01 (diagonal) ---
interface p03-eth2
 description "Diagonal link to P01 (10.0.13.0/30)"
 ip address 10.0.13.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P03 <-> PE02 (dual-homed) ---
interface p03-pe02
 description "Edge link to PE02 alternate path (10.0.23.0/30)"
 ip address 10.0.23.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P03 <-> PE03 ---
interface p03-pe03
 description "Edge link to PE03 (10.0.24.0/30)"
 ip address 10.0.24.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.3
 network 10.0.0.3/32 area 0
 network 10.0.11.0/30 area 0
 network 10.0.12.0/30 area 0
 network 10.0.13.0/30 area 0
 network 10.0.23.0/30 area 0
 network 10.0.24.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.3
 address-family ipv4
  discovery transport-address 10.0.0.3
  interface p03-eth0
  interface p03-eth1
  interface p03-eth2
  interface p03-pe02
  interface p03-pe03
 exit-address-family
!
line vty
!

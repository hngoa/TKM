! ============================================================
! p02.conf — FRR Configuration for P02 (Provider Core Router)
! Role: MPLS Label Switching Only — Central Hub Router
! Protocols: OSPF Area 0 + LDP
!
! Interfaces:
!   p02-eth0  10.0.10.2/30  -> P01
!   p02-eth1  10.0.11.1/30  -> P03
!   p02-eth2  10.0.14.1/30  -> P04 (diagonal)
!   p02-pe01  10.0.21.2/30  -> PE01 (dual-homed)
!   p02-pe02  10.0.22.2/30  -> PE02
!   lo        10.0.0.2/32   loopback
! ============================================================

frr defaults traditional
hostname p02
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.2/32
 ip ospf area 0
!
! --- Link P02 <-> P01 ---
interface p02-eth0
 description "Core link to P01 (10.0.10.0/30)"
 ip address 10.0.10.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P02 <-> P03 ---
interface p02-eth1
 description "Core link to P03 (10.0.11.0/30)"
 ip address 10.0.11.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P02 <-> P04 (diagonal) ---
interface p02-eth2
 description "Diagonal link to P04 (10.0.14.0/30)"
 ip address 10.0.14.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P02 <-> PE01 (dual-homed) ---
interface p02-pe01
 description "Edge link to PE01 alternate path (10.0.21.0/30)"
 ip address 10.0.21.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P02 <-> PE02 ---
interface p02-pe02
 description "Edge link to PE02 (10.0.22.0/30)"
 ip address 10.0.22.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.2
 network 10.0.0.2/32 area 0
 network 10.0.10.0/30 area 0
 network 10.0.11.0/30 area 0
 network 10.0.14.0/30 area 0
 network 10.0.21.0/30 area 0
 network 10.0.22.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.2
 address-family ipv4
  discovery transport-address 10.0.0.2
  interface p02-eth0
  interface p02-eth1
  interface p02-eth2
  interface p02-pe01
  interface p02-pe02
 exit-address-family
!
line vty
!

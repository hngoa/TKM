! ============================================================
! p04.conf — FRR Configuration for P04 (Provider Core Router)
! Role: MPLS Label Switching Only — East Hub
! Protocols: OSPF Area 0 + LDP
!
! Interfaces:
!   p04-eth0  10.0.12.2/30  -> P03
!   p04-eth1  10.0.14.2/30  -> P02 (diagonal)
!   p04-pe03  10.0.25.2/30  -> PE03 (dual-homed)
!   lo        10.0.0.4/32   loopback
! ============================================================

frr defaults traditional
hostname p04
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.4/32
 ip ospf area 0
!
! --- Link P04 <-> P03 ---
interface p04-eth0
 description "Core link to P03 (10.0.12.0/30)"
 ip address 10.0.12.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P04 <-> P02 (diagonal) ---
interface p04-eth1
 description "Diagonal link to P02 (10.0.14.0/30)"
 ip address 10.0.14.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P04 <-> PE03 (dual-homed) ---
interface p04-pe03
 description "Edge link to PE03 alternate path (10.0.25.0/30)"
 ip address 10.0.25.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.4
 network 10.0.0.4/32 area 0
 network 10.0.12.0/30 area 0
 network 10.0.14.0/30 area 0
 network 10.0.25.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.4
 address-family ipv4
  discovery transport-address 10.0.0.4
  interface p04-eth0
  interface p04-eth1
  interface p04-pe03
 exit-address-family
!
line vty
!

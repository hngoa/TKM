! ============================================================
! p01.conf — FRR Configuration for P01 (Provider Core Router)
! Role: MPLS Label Switching Only
! Protocols: OSPF Area 0 + LDP (Label Distribution Protocol)
!
! Interfaces:
!   p01-eth0  10.0.10.1/30  -> P02
!   p01-eth1  10.0.13.1/30  -> P03 (diagonal)
!   p01-pe01  10.0.20.2/30  -> PE01
!   lo        10.0.0.1/32   loopback (router-id + LDP transport)
! ============================================================

frr defaults traditional
hostname p01
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback (Router-ID + LDP transport address) ---
interface lo
 ip address 10.0.0.1/32
 ip ospf area 0
!
! --- Link P01 <-> P02 ---
interface p01-eth0
 description "Core link to P02 (10.0.10.0/30)"
 ip address 10.0.10.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P01 <-> P03 (diagonal shortcut) ---
interface p01-eth1
 description "Diagonal link to P03 (10.0.13.0/30)"
 ip address 10.0.13.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link P01 <-> PE01 ---
interface p01-pe01
 description "Edge link to PE01 (10.0.20.0/30)"
 ip address 10.0.20.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.1
 ! Quảng bá loopback vào OSPF (dùng cho LDP transport)
 network 10.0.0.1/32 area 0
 ! Quảng bá tất cả directly connected P-P và PE-P links
 network 10.0.10.0/30 area 0
 network 10.0.13.0/30 area 0
 network 10.0.20.0/30 area 0
 ! Không redistribute customer routes (P không biết về customers)
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.1
 address-family ipv4
  ! LDP transport dùng loopback để tránh flap khi interface down
  discovery transport-address 10.0.0.1
  ! Bật LDP trên tất cả P-P và PE-P interfaces
  interface p01-eth0
  interface p01-eth1
  interface p01-pe01
 exit-address-family
!
line vty
!

! ============================================================
! pe03.conf — FRR Configuration for PE03 (Provider Edge Router)
! Role: VPLS Endpoint — serves Branch 3 (ce03)
! Protocols: OSPF + LDP + iBGP (L2VPN EVPN) + VPLS
!
! Interfaces:
!   pe03-p03  10.0.24.1/30   -> P03 (primary backbone path)
!   pe03-p04  10.0.25.1/30   -> P04 (alternate backbone path)
!   pe03-ce03 10.100.3.1/30  -> CE03 (WAN to Branch 3) [AC port]
!   lo        10.0.0.13/32   loopback
! ============================================================

frr defaults traditional
hostname pe03
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.13/32
 ip ospf area 0
!
! --- Link PE03 -> P03 (primary upstream) ---
interface pe03-p03
 description "Backbone uplink to P03 - primary path"
 ip address 10.0.24.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE03 -> P04 (alternate upstream, dual-homed) ---
interface pe03-p04
 description "Backbone uplink to P04 - alternate path (dual-homed)"
 ip address 10.0.25.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE03 -> CE03 (WAN handoff - Attachment Circuit) ---
interface pe03-ce03
 description "WAN handoff to CE03 - Branch 3 (VPLS AC port)"
 ip address 10.100.3.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.13
 network 10.0.0.13/32 area 0
 network 10.0.24.0/30 area 0
 network 10.0.25.0/30 area 0
 network 10.100.3.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.13
 address-family ipv4
  discovery transport-address 10.0.0.13
  interface pe03-p03
  interface pe03-p04
 exit-address-family
!
! --- BGP Configuration ---
router bgp 65000
 bgp router-id 10.0.0.13
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.11 remote-as 65000
 neighbor 10.0.0.11 description "iBGP to PE01"
 neighbor 10.0.0.11 update-source lo
 neighbor 10.0.0.11 next-hop-self
 !
 neighbor 10.0.0.12 remote-as 65000
 neighbor 10.0.0.12 description "iBGP to PE02"
 neighbor 10.0.0.12 update-source lo
 neighbor 10.0.0.12 next-hop-self
 !
 address-family l2vpn evpn
  neighbor 10.0.0.11 activate
  neighbor 10.0.0.12 activate
  advertise-all-vni
 exit-address-family
!
! --- VPLS Instance ---
! Lưu ý: FRR stable KHÔNG hỗ trợ native VPLS syntax.
! Dự án dùng GRE bridge fallback (xem vpls_policy.yaml).
!
! l2vpn BRANCH-VPLS vpls
!  bridge-group vpls-br
!  member pseudowire pe03-pw-pe01
!   neighbor 10.0.0.11 pw-id 101
!  member pseudowire pe03-pw-pe02
!   neighbor 10.0.0.12 pw-id 102
!  member interface pe03-ce03
!
line vty
!

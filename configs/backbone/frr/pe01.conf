! ============================================================
! pe01.conf — FRR Configuration for PE01 (Provider Edge Router)
! Role: VPLS Endpoint — serves Branch 1 (ce01)
! Protocols: OSPF + LDP + iBGP (L2VPN EVPN) + VPLS
!
! Interfaces:
!   pe01-p01  10.0.20.1/30   -> P01 (primary backbone path)
!   pe01-p02  10.0.21.1/30   -> P02 (alternate backbone path)
!   pe01-ce01 10.100.1.1/30  -> CE01 (WAN to Branch 1) [AC port]
!   lo        10.0.0.11/32   loopback
! ============================================================

frr defaults traditional
hostname pe01
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback (Router-ID + LDP transport + BGP update-source) ---
interface lo
 ip address 10.0.0.11/32
 ip ospf area 0
!
! --- Link PE01 -> P01 (primary upstream) ---
interface pe01-p01
 description "Backbone uplink to P01 - primary path"
 ip address 10.0.20.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE01 -> P02 (alternate upstream, dual-homed) ---
interface pe01-p02
 description "Backbone uplink to P02 - alternate path (dual-homed)"
 ip address 10.0.21.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE01 -> CE01 (WAN handoff - Attachment Circuit) ---
! Lưu ý: interface này KHÔNG cần MPLS, là phần LAN phía CE
interface pe01-ce01
 description "WAN handoff to CE01 - Branch 1 (VPLS AC port)"
 ip address 10.100.1.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- OSPF Configuration ---
! PE quảng bá tất cả interfaces vào OSPF để P routers biết đường đến PE loopback
! Không quảng bá customer prefixes (10.1.0.0/24 etc.) vào backbone OSPF
router ospf
 ospf router-id 10.0.0.11
 ! Loopback - critical cho LDP transport và BGP next-hop
 network 10.0.0.11/32 area 0
 ! Backbone links
 network 10.0.20.0/30 area 0
 network 10.0.21.0/30 area 0
 ! WAN link (PE-CE) - cần để CE biết bgp next-hop
 network 10.100.1.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.11
 address-family ipv4
  discovery transport-address 10.0.0.11
  ! LDP chỉ trên backbone interfaces (không trên AC port)
  interface pe01-p01
  interface pe01-p02
 exit-address-family
!
! --- BGP Configuration (iBGP full-mesh giữa PE01, PE02, PE03) ---
! Dùng cho VPLS signaling qua L2VPN EVPN
router bgp 65000
 bgp router-id 10.0.0.11
 bgp log-neighbor-changes
 ! Không enable unicast IPv4 address-family mặc định
 no bgp default ipv4-unicast
 !
 ! iBGP neighbors (các PE khác)
 neighbor 10.0.0.12 remote-as 65000
 neighbor 10.0.0.12 description "iBGP to PE02"
 neighbor 10.0.0.12 update-source lo
 neighbor 10.0.0.12 next-hop-self
 !
 neighbor 10.0.0.13 remote-as 65000
 neighbor 10.0.0.13 description "iBGP to PE03"
 neighbor 10.0.0.13 update-source lo
 neighbor 10.0.0.13 next-hop-self
 !
 ! L2VPN EVPN address-family cho VPLS signaling
 address-family l2vpn evpn
  neighbor 10.0.0.12 activate
  neighbor 10.0.0.13 activate
  advertise-all-vni
 exit-address-family
!
! --- VPLS Instance (L2VPN) ---
! Tạo pseudowire đến PE02 và PE03 để bridge L2 traffic
! Cấu hình này phụ thuộc vào FRR version hỗ trợ VPLS
! Fallback: dùng GRE bridge trong runner script
l2vpn BRANCH-VPLS vpls
 bridge-group vpls-br
 member pseudowire pe01-pw-pe02
  neighbor 10.0.0.12 pw-id 100
 member pseudowire pe01-pw-pe03
  neighbor 10.0.0.13 pw-id 101
 member interface pe01-ce01
!
line vty
!

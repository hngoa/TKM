! ============================================================
! pe02.conf — FRR Configuration for PE02 (Provider Edge Router)
! Role: VPLS Endpoint — serves Branch 2 (ce02)
! Protocols: OSPF + LDP + iBGP (L2VPN EVPN) + VPLS
!
! Interfaces:
!   pe02-p02  10.0.22.1/30   -> P02 (primary backbone path)
!   pe02-p03  10.0.23.1/30   -> P03 (alternate backbone path)
!   pe02-ce02 10.100.2.1/30  -> CE02 (WAN to Branch 2) [AC port]
!   lo        10.0.0.12/32   loopback
! ============================================================

frr defaults traditional
hostname pe02
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
! --- Loopback ---
interface lo
 ip address 10.0.0.12/32
 ip ospf area 0
!
! --- Link PE02 -> P02 (primary upstream) ---
interface pe02-p02
 description "Backbone uplink to P02 - primary path"
 ip address 10.0.22.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE02 -> P03 (alternate upstream, dual-homed) ---
interface pe02-p03
 description "Backbone uplink to P03 - alternate path (dual-homed)"
 ip address 10.0.23.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 1
 ip ospf dead-interval 4
 mpls enable
!
! --- Link PE02 -> CE02 (WAN handoff - Attachment Circuit) ---
interface pe02-ce02
 description "WAN handoff to CE02 - Branch 2 (VPLS AC port)"
 ip address 10.100.2.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
! --- OSPF Configuration ---
router ospf
 ospf router-id 10.0.0.12
 network 10.0.0.12/32 area 0
 network 10.0.22.0/30 area 0
 network 10.0.23.0/30 area 0
 network 10.100.2.0/30 area 0
!
! --- MPLS LDP Configuration ---
mpls ldp
 router-id 10.0.0.12
 address-family ipv4
  discovery transport-address 10.0.0.12
  interface pe02-p02
  interface pe02-p03
 exit-address-family
!
! --- BGP Configuration ---
router bgp 65000
 bgp router-id 10.0.0.12
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 neighbor 10.0.0.11 remote-as 65000
 neighbor 10.0.0.11 description "iBGP to PE01"
 neighbor 10.0.0.11 update-source lo
 neighbor 10.0.0.11 next-hop-self
 !
 neighbor 10.0.0.13 remote-as 65000
 neighbor 10.0.0.13 description "iBGP to PE03"
 neighbor 10.0.0.13 update-source lo
 neighbor 10.0.0.13 next-hop-self
 !
 address-family l2vpn evpn
  neighbor 10.0.0.11 activate
  neighbor 10.0.0.13 activate
  advertise-all-vni
 exit-address-family
!
! --- VPLS Instance ---
! Lưu ý: FRR stable KHÔNG hỗ trợ native VPLS syntax.
! Dự án dùng GRE bridge fallback (xem vpls_policy.yaml).
!
! l2vpn BRANCH-VPLS vpls
!  bridge-group vpls-br
!  member pseudowire pe02-pw-pe01
!   neighbor 10.0.0.11 pw-id 100
!  member pseudowire pe02-pw-pe03
!   neighbor 10.0.0.13 pw-id 102
!  member interface pe02-ce02
!
line vty
!

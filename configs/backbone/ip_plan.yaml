# ============================================================
# configs/backbone/ip_plan.yaml
# MPLS Backbone — ISP Network
# Mô phỏng nhà cung cấp dịch vụ MAN (Metro Area Network)
# ============================================================

description: "MPLS MAN Backbone - ISP Provider Network"
asn: 65000                      # Internal AS number
ospf_area: "0.0.0.0"           # Backbone OSPF area
ldp_transport: loopback         # LDP transport address = loopback

# ----------------------------------------------------------------
# P-Routers (Provider Core Routers)
# ----------------------------------------------------------------
p_routers:
  - name: p01
    loopback: 10.0.0.1/32
    description: "Core Router P01 - West hub"
    frr_config: "configs/backbone/frr/p01.conf"
    interfaces:
      - name: p01-eth0
        ip: 10.0.10.1/30
        peer: p02
      - name: p01-eth1
        ip: 10.0.13.1/30
        peer: p03
      - name: p01-pe01
        ip: 10.0.20.2/30
        peer: pe01
    static_routes:
      - {prefix: 10.0.0.2/32, via: 10.0.10.2}
      - {prefix: 10.0.0.3/32, via: 10.0.13.2}
      - {prefix: 10.0.0.4/32, via: 10.0.10.2}
      - {prefix: 10.0.0.11/32, via: 10.0.20.1}
      - {prefix: 10.0.0.12/32, via: 10.0.10.2}
      - {prefix: 10.0.0.13/32, via: 10.0.13.2}
      - {prefix: 10.0.11.0/30, via: 10.0.10.2}
      - {prefix: 10.0.12.0/30, via: 10.0.10.2}
      - {prefix: 10.0.14.0/30, via: 10.0.10.2}
      - {prefix: 10.0.21.0/30, via: 10.0.10.2}
      - {prefix: 10.0.22.0/30, via: 10.0.10.2}
      - {prefix: 10.0.23.0/30, via: 10.0.13.2}
      - {prefix: 10.0.24.0/30, via: 10.0.13.2}
      - {prefix: 10.0.25.0/30, via: 10.0.10.2}

  - name: p02
    loopback: 10.0.0.2/32
    description: "Core Router P02 - Central hub"
    frr_config: "configs/backbone/frr/p02.conf"
    interfaces:
      - name: p02-eth0
        ip: 10.0.10.2/30
        peer: p01
      - name: p02-eth1
        ip: 10.0.11.1/30
        peer: p03
      - name: p02-eth2
        ip: 10.0.14.1/30
        peer: p04
      - name: p02-pe01
        ip: 10.0.21.2/30
        peer: pe01
      - name: p02-pe02
        ip: 10.0.22.2/30
        peer: pe02
    static_routes:
      - {prefix: 10.0.0.1/32, via: 10.0.10.1}
      - {prefix: 10.0.0.3/32, via: 10.0.11.2}
      - {prefix: 10.0.0.4/32, via: 10.0.14.2}
      - {prefix: 10.0.0.11/32, via: 10.0.21.1}
      - {prefix: 10.0.0.12/32, via: 10.0.22.1}
      - {prefix: 10.0.0.13/32, via: 10.0.11.2}
      - {prefix: 10.0.13.0/30, via: 10.0.10.1}
      - {prefix: 10.0.12.0/30, via: 10.0.11.2}
      - {prefix: 10.0.20.0/30, via: 10.0.10.1}
      - {prefix: 10.0.23.0/30, via: 10.0.11.2}
      - {prefix: 10.0.24.0/30, via: 10.0.11.2}
      - {prefix: 10.0.25.0/30, via: 10.0.14.2}

  - name: p03
    loopback: 10.0.0.3/32
    description: "Core Router P03 - East-Central hub"
    frr_config: "configs/backbone/frr/p03.conf"
    interfaces:
      - name: p03-eth0
        ip: 10.0.11.2/30
        peer: p02
      - name: p03-eth1
        ip: 10.0.12.1/30
        peer: p04
      - name: p03-eth2
        ip: 10.0.13.2/30
        peer: p01
      - name: p03-pe02
        ip: 10.0.23.2/30
        peer: pe02
      - name: p03-pe03
        ip: 10.0.24.2/30
        peer: pe03
    static_routes:
      - {prefix: 10.0.0.1/32, via: 10.0.13.1}
      - {prefix: 10.0.0.2/32, via: 10.0.11.1}
      - {prefix: 10.0.0.4/32, via: 10.0.12.2}
      - {prefix: 10.0.0.11/32, via: 10.0.11.1}
      - {prefix: 10.0.0.12/32, via: 10.0.23.1}
      - {prefix: 10.0.0.13/32, via: 10.0.24.1}
      - {prefix: 10.0.10.0/30, via: 10.0.11.1}
      - {prefix: 10.0.14.0/30, via: 10.0.11.1}
      - {prefix: 10.0.20.0/30, via: 10.0.11.1}
      - {prefix: 10.0.21.0/30, via: 10.0.11.1}
      - {prefix: 10.0.22.0/30, via: 10.0.11.1}
      - {prefix: 10.0.25.0/30, via: 10.0.12.2}

  - name: p04
    loopback: 10.0.0.4/32
    description: "Core Router P04 - East hub"
    frr_config: "configs/backbone/frr/p04.conf"
    interfaces:
      - name: p04-eth0
        ip: 10.0.12.2/30
        peer: p03
      - name: p04-eth1
        ip: 10.0.14.2/30
        peer: p02
      - name: p04-pe03
        ip: 10.0.25.2/30
        peer: pe03
    static_routes:
      - {prefix: 10.0.0.1/32, via: 10.0.14.1}
      - {prefix: 10.0.0.2/32, via: 10.0.14.1}
      - {prefix: 10.0.0.3/32, via: 10.0.12.1}
      - {prefix: 10.0.0.11/32, via: 10.0.14.1}
      - {prefix: 10.0.0.12/32, via: 10.0.12.1}
      - {prefix: 10.0.0.13/32, via: 10.0.25.1}
      - {prefix: 10.0.10.0/30, via: 10.0.14.1}
      - {prefix: 10.0.11.0/30, via: 10.0.12.1}
      - {prefix: 10.0.13.0/30, via: 10.0.12.1}
      - {prefix: 10.0.20.0/30, via: 10.0.14.1}
      - {prefix: 10.0.21.0/30, via: 10.0.14.1}
      - {prefix: 10.0.22.0/30, via: 10.0.14.1}
      - {prefix: 10.0.23.0/30, via: 10.0.12.1}
      - {prefix: 10.0.24.0/30, via: 10.0.12.1}

# ----------------------------------------------------------------
# PE-Routers (Provider Edge Routers)
# ----------------------------------------------------------------
pe_routers:
  - name: pe01
    loopback: 10.0.0.11/32
    description: "Edge Router PE01 - Branch 1 Gateway"
    frr_config: "configs/backbone/frr/pe01.conf"
    interfaces:
      - name: pe01-p01
        ip: 10.0.20.1/30
        peer: p01
      - name: pe01-p02
        ip: 10.0.21.1/30
        peer: p02
      - name: pe01-ce01
        ip: 10.100.1.1/30
        peer: ce01
        wan_link: true
    static_routes:
      - {prefix: 10.0.0.0/16, via: 10.0.20.2}
      - {prefix: 10.0.0.12/32, via: 10.0.21.2}
      - {prefix: 10.0.0.13/32, via: 10.0.21.2}
      - {prefix: 10.0.22.0/30, via: 10.0.21.2}
      - {prefix: 10.0.23.0/30, via: 10.0.21.2}
      - {prefix: 10.0.24.0/30, via: 10.0.21.2}
      - {prefix: 10.0.25.0/30, via: 10.0.21.2}

  - name: pe02
    loopback: 10.0.0.12/32
    description: "Edge Router PE02 - Branch 2 Gateway"
    frr_config: "configs/backbone/frr/pe02.conf"
    interfaces:
      - name: pe02-p02
        ip: 10.0.22.1/30
        peer: p02
      - name: pe02-p03
        ip: 10.0.23.1/30
        peer: p03
      - name: pe02-ce02
        ip: 10.100.2.1/30
        peer: ce02
        wan_link: true
    static_routes:
      - {prefix: 10.0.0.0/16, via: 10.0.22.2}
      - {prefix: 10.0.0.11/32, via: 10.0.22.2}
      - {prefix: 10.0.0.13/32, via: 10.0.23.2}
      - {prefix: 10.0.20.0/30, via: 10.0.22.2}
      - {prefix: 10.0.21.0/30, via: 10.0.22.2}
      - {prefix: 10.0.24.0/30, via: 10.0.23.2}
      - {prefix: 10.0.25.0/30, via: 10.0.23.2}

  - name: pe03
    loopback: 10.0.0.13/32
    description: "Edge Router PE03 - Branch 3 Gateway"
    frr_config: "configs/backbone/frr/pe03.conf"
    interfaces:
      - name: pe03-p03
        ip: 10.0.24.1/30
        peer: p03
      - name: pe03-p04
        ip: 10.0.25.1/30
        peer: p04
      - name: pe03-ce03
        ip: 10.100.3.1/30
        peer: ce03
        wan_link: true
    static_routes:
      - {prefix: 10.0.0.0/16, via: 10.0.24.2}
      - {prefix: 10.0.0.11/32, via: 10.0.24.2}
      - {prefix: 10.0.0.12/32, via: 10.0.24.2}
      - {prefix: 10.0.20.0/30, via: 10.0.24.2}
      - {prefix: 10.0.21.0/30, via: 10.0.24.2}
      - {prefix: 10.0.22.0/30, via: 10.0.24.2}
      - {prefix: 10.0.23.0/30, via: 10.0.24.2}

# ----------------------------------------------------------------
# Links Summary (cho builder tái sử dụng)
# ----------------------------------------------------------------
backbone_links:
  - {src: p01, dst: p02, bw: 1000, delay: '2ms', intf1: p01-eth0, intf2: p02-eth0}
  - {src: p02, dst: p03, bw: 1000, delay: '2ms', intf1: p02-eth1, intf2: p03-eth0}
  - {src: p03, dst: p04, bw: 1000, delay: '2ms', intf1: p03-eth1, intf2: p04-eth0}
  - {src: p01, dst: p03, bw: 1000, delay: '3ms', intf1: p01-eth1, intf2: p03-eth2}
  - {src: p02, dst: p04, bw: 1000, delay: '3ms', intf1: p02-eth2, intf2: p04-eth1}

pe_p_links:
  - {src: pe01, dst: p01, bw: 1000, delay: '1ms', intf1: pe01-p01, intf2: p01-pe01}
  - {src: pe01, dst: p02, bw: 1000, delay: '1ms', intf1: pe01-p02, intf2: p02-pe01}
  - {src: pe02, dst: p02, bw: 1000, delay: '1ms', intf1: pe02-p02, intf2: p02-pe02}
  - {src: pe02, dst: p03, bw: 1000, delay: '1ms', intf1: pe02-p03, intf2: p03-pe02}
  - {src: pe03, dst: p03, bw: 1000, delay: '1ms', intf1: pe03-p03, intf2: p03-pe03}
  - {src: pe03, dst: p04, bw: 1000, delay: '1ms', intf1: pe03-p04, intf2: p04-pe03}

wan_links:
  - {pe: pe01, ce: ce01, pe_ip: 10.100.1.1/30, ce_ip: 10.100.1.2/30}
  - {pe: pe02, ce: ce02, pe_ip: 10.100.2.1/30, ce_ip: 10.100.2.2/30}
  - {pe: pe03, ce: ce03, pe_ip: 10.100.3.1/30, ce_ip: 10.100.3.2/30}
